name: 每日热点日报推送

# 触发条件
on:
  # 定时执行：每天 UTC 01:00 (北京时间 09:00)
  schedule:
    - cron: '0 1 * * *'

  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-push:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    # 设置超时时间
    timeout-minutes: 15

    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. 安装 Python 依赖
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests

      # 4. 生成热点日报并发送推送
      - name: 生成并推送热点日报（飞书）
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          cd hotspot-radar-manual
          python scripts/generate_hotspots.py \
            --domain all \
            --top 50 \
            --no-fallback \
            --feishu

      # 5. 上传生成的 HTML 文件
      - name: 上传报告文件
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hotspot-report-${{ github.run_number }}
          path: hotspot-radar-manual/output/*.html
          retention-days: 30

      - name: 同步最新 HTML 到 Pages 目录
        if: always()
        run: |
          mkdir -p docs
          cp hotspot-radar-manual/output/hotspots-all-latest.html docs/index.html

      - name: 上传到 GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: 部署到 GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
