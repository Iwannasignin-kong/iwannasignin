name: 每日热点日报推送

# 触发条件
on:
  # 定时执行：每天 UTC 10:30 (北京时间 18:30)
  schedule:
    - cron: '30 10 * * *'

  # 支持手动触发
  workflow_dispatch:

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    # 设置超时时间
    timeout-minutes: 15

    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. 安装 Python 依赖
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests

      # 4. 生成热点日报并发送推送
      - name: 生成并推送热点日报（飞书）
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          cd hotspot-radar-manual
          python scripts/generate_hotspots.py \
            --domain all \
            --top 50 \
            --no-fallback \
            --feishu

      # 5. 上传生成的 HTML 文件
      - name: 上传报告文件
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hotspot-report-${{ github.run_number }}
          path: hotspot-radar-manual/output/*.html
          retention-days: 30
